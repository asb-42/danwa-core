# deploy/prometheus.yml — Prometheus configuration (optional)
#
# Usage with Docker:
#   docker run -p 9090:9090 -v $(pwd)/deploy/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus
#
# Scrapes the Danwa backend /metrics endpoint.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "danwa-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "danwa-api"

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: "redis"
