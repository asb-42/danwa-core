# deploy/nginx.conf — Nginx reverse proxy for Danwa
#
# Production: Mount TLS certificates into the container
# Development: Uses HTTP only (TLS section commented out)

# Upstream backend
upstream backend {
    server backend:8000;
}

# HTTPS server (production)
# Uncomment ssl directives and provide certificates for production use
server {
    listen 443 ssl http2;
    server_name danwa.example.com;

    # TLS certificates (mount via docker volume)
    ssl_certificate     /etc/letsencrypt/live/danwa.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/danwa.example.com/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (debate streaming)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Health endpoint (no auth required)
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
    }

    # Upload size limit
    client_max_body_size 100M;
}

# HTTP server — redirects to HTTPS in production
server {
    listen 80;
    server_name danwa.example.com;

    # For local development without TLS, comment out the redirect
    # and uncomment the proxy sections below

    # Production: redirect to HTTPS
    return 301 https://$host$request_uri;

    # Development: proxy directly (uncomment to use without TLS)
    # location / {
    #     proxy_pass http://backend;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_http_version 1.1;
    #     proxy_set_header Connection "";
    #     proxy_buffering off;
    # }
}
